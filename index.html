<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمصة زين - ملك التسالي</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            border: 3px solid #ccff00;
            margin: 10px;
            border-radius: 25px;
            min-height: 95vh;
            background-color: #050505;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 40px 10px;
            text-align: center;
            border-bottom: 2px dashed #ccff00;
        }

        .logo-text {
            font-size: 50px;
            font-weight: bold;
            color: #ccff00;
            margin: 0;
        }

        .welcome-tag {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .items-container {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item-card {
            border: 1px solid #222;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            background-color: #0a0a0a;
            transition: 0.3s ease-in-out;
        }

        .item-card:hover {
            border-color: #ccff00;
            background-color: #0f0f0f;
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: #ffffff;
        }

        .order-btn {
            background-color: #ccff00;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 25px;
            font-size: 14px;
            color: #444;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <h1 class="logo-text">محمصة زين</h1>
        <div class="welcome-tag">تسالي طازجة.. اطلب واعرف السعر فوراً</div>
    </header>

    <div class="items-container">
        <div class="item-card">
            <h3>لب سوبر</h3>
            <button class="order-btn" onclick="askPrice('لب سوبر')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>سوداني فاخر</h3>
            <button class="order-btn" onclick="askPrice('سوداني بقشره')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>لب عباد</h3>
            <button class="order-btn" onclick="askPrice('لب عباد')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>ميكس تسالي</h3>
            <button class="order-btn" onclick="askPrice('ميكس مقرمشات')">طلب وسعر</button>
        </div>
        
        <div class="item-card">
            <h3>فستق ولوز</h3>
            <button class="order-btn" onclick="askPrice('مكسرات فاخرة')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>حب رمان</h3>
            <button class="order-btn" onclick="askPrice('لب خشب رمان')">طلب وسعر</button>
        </div>
    </div>

    <footer>
        هدية من أشرف حسن (Creative 2026) لأخيه الغالي
    </footer>
</div>

<script>
    function askPrice(itemName) {
        const phone = "201111210119"; 
        const message = "السلام عليكم يا محمصة زين.. من فضلك أريد معرفة سعر طلب " + itemName + " المتاح حالياً.";
        const whatsappUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
        window.location.href = whatsappUrl;
    }
</script>

</body>
</html>
