<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمصة زين - ملك التسالي</title>
    <style>
        /* تصميم أشرف حسن - ملكي ليموني */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            border: 3px solid #ccff00;
            margin: 15px;
            border-radius: 25px;
            min-height: 94vh;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.15);
        }

        header {
            padding: 45px 15px;
            text-align: center;
            border-bottom: 2px dashed #ccff00;
        }

        .logo-text {
            font-size: 55px;
            font-weight: bold;
            color: #ccff00;
            margin: 0;
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.2);
        }

        .tagline {
            font-size: 18px;
            color: #888;
            margin-top: 12px;
        }

        .items-grid {
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item-card {
            border: 1px solid #222;
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            background-color: #0a0a0a;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item-card:hover {
            border-color: #ccff00;
            transform: scale(1.05);
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: #ffffff;
        }

        .order-btn {
            background-color: #ccff00;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .special-item {
            border: 2px solid #ccff00 !important;
            grid-column: span 2; /* تأخذ العرض بالكامل لتمييزها */
            background: linear-gradient(to bottom, #0a0a0a, #1a1a00);
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 25px;
            font-size: 14px;
            color: #444;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <h1 class="logo-text">محمصة زين</h1>
        <div class="tagline">تسالي طازجة | اطلب واعرف السعر فوراً</div>
    </header>

    <div class="items-grid">
        <!-- صنف مميز: لب خشب -->
        <div class="item-card special-item">
            <h3 style="color: #ccff00; font-size: 24px;">🌟 لب خشب (رمان) 🌟</h3>
            <button class="order-btn" onclick="askPrice('لب خشب رمان المميز')">اطلب النوادر</button>
        </div>

        <div class="item-card">
            <h3>لب سوبر</h3>
            <button class="order-btn" onclick="askPrice('لب سوبر')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>سوداني بقشره</h3>
            <button class="order-btn" onclick="askPrice('سوداني بقشره')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>لب عباد سوري</h3>
            <button class="order-btn" onclick="askPrice('لب عباد سوري')">طلب وسعر</button>
        </div>

        <div class="item-card">
            <h3>ميكس مقرمشات</h3>
            <button class="order-btn" onclick="askPrice('ميكس مقرمشات')">طلب وسعر</button>
        </div>
    </div>

    <footer>
        بكل حب لأخي.. تم التطوير بواسطة أشرف حسن (Creative 2026)
    </footer>
</div>

<script>
    function askPrice(itemName) {
        const phone = "201111210119"; 
        const message = "السلام عليكم يا محمصة زين.. من فضلك أريد معرفة سعر طلب " + itemName + " المتاح حالياً.";
        const whatsappUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
        window.location.href = whatsappUrl;
    }
</script>

</body>
</html>
